name: Auto Scrape World Cup Scores

on:
  schedule:
    - cron: '0 */4 * * *' # Chạy mỗi 4 tiếng (Tuỳ chỉnh theo nhu cầu)
  workflow_dispatch: # Cho phép bấm chạy thủ công trên giao diện GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền push code

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        run: npm run scrape

      - name: Check for Changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/matches.json
          git commit -m "Auto-update match scores [skip ci]"
          git push
