<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldCup Live Hub 2026</title>
    <link rel="icon" href="goal-track-logo.png?v=2" type="image/png">
    <link rel="shortcut icon" href="goal-track-logo.png?v=2" type="image/png">
    <link rel="apple-touch-icon" href="goal-track-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="description" content="Trang web cập nhật nhanh thông tin các trận đấu World Cup 2026. Thiết kế hiện đại, dễ dàng tra cứu tỷ số và lịch thi đấu.">
</head>
<body>
    <div class="container">
        <header>
            <h1>WorldCup 2026 Live Hub</h1>
            <p>Theo dõi tỷ số, lịch thi đấu và thông tin các trận đấu mới nhất</p>
        </header>

        <main>
            <div id="next-match-section" class="featured-match"></div>
            <div id="prev-match-section" class="featured-match" style="margin-top: 2rem;"></div>
            
            <div id="upcoming-matches-section" style="margin-top: 3rem;">
                <h2 class="date-header"><span class="date-bar"></span> Các trận đấu tiếp theo</h2>
                <div id="upcoming-matches-grid" class="matches-list"></div>
            </div>

            <div style="text-align: center; margin-top: 3rem; margin-bottom: 2rem;">
                <a href="matches.html" class="btn btn-primary" style="padding: 1rem 2.5rem; font-size: 1.2rem;">Xem các trận đấu khác</a>
            </div>
        </main>
    </div>

    <footer>
        <p>Thực hiện bởi <a href="https://github.com/TwotNguyenVN/goal-track" target="_blank">TwotNguyenVN</a> • World Cup 2026 Live Hub</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
